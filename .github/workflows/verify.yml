name: Verify TLC

on:
  push:
    branches: [main]
    paths:
      - 'spec/**'
      - 'puzzles/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Download tla2tools.jar
        run: |
          curl -fsSL -o tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar

      - name: Verify cached puzzles
        run: |
          for dir in puzzles/*/; do
            cfg="$dir/Pips.cfg"
            [ -f "$cfg" ] || continue
            for spec in "$dir"easy.tla "$dir"medium.tla "$dir"hard.tla; do
              [ -f "$spec" ] || continue
              echo "::group::Verifying $spec"
              java -XX:+UseParallelGC -Xmx4g -jar tla2tools.jar \
                -config "$cfg" -deadlock -workers 4 "$spec" \
                || [ $? -eq 12 ]
              echo "::endgroup::"
            done
          done
