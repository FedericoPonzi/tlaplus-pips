name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 5 * * *"  # Daily at 5:30 UTC — fetch new puzzle
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout tlaplus-web (Java wrapper)
        uses: actions/checkout@v4
        with:
          repository: federicoponzi/tlaplus-web
          path: tlaplus-web

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Build CheerpJ JAR
        working-directory: tlaplus-web/java-wrapper
        run: ./gradlew buildWebJar

      - name: Copy JAR to public/
        run: cp tlaplus-web/java-wrapper/build/libs/tlaplus-web-cheerpj.jar web/public/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install & build Next.js
        working-directory: web
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: |
          npm ci
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
